services:
  api:
    build:
      context: ./server
    container_name: tasks-api
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/task
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: http://localhost:3000
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    container_name: tasks-client
    ports:
      - '3000:3000'
    depends_on:
      - api
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: taskflow-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo-data:
